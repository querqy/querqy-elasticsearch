name: Build

on: [push, pull_request]

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        jdk: [ 21, 24 ]

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.jdk }}
        cache: 'maven'
    - name: Build with Maven
      run: mvn -B package --file pom.xml
